name: Flyway Migration

on:
  push:
    branches: [ "main" ]

jobs:
  dit:
    name: Deploy to DIT
    runs-on: ubuntu-latest
    environment: DIT

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Flyway (DIT)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:postgresql://ep-cold-sun-amjgpd78.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            migrate

  sit:
    name: Deploy to SIT
    runs-on: ubuntu-latest
    needs: dit
    environment: SIT

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Flyway (SIT)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:postgresql://ep-cold-sun-amjgpd78.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            migrate

  prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: sit
    environment: PROD

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Flyway (PROD)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:postgresql://ep-cold-sun-amjgpd78.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            migrate
