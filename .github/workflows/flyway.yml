name: Flyway Migration

on:
  push:
    branches: [ "main" ]

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flyway
        run: |
          curl -L https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/9.22.0/flyway-commandline-9.22.0-linux-x64.tar.gz | tar xvz
          sudo ln -s $(pwd)/flyway-9.22.0/flyway /usr/local/bin/flyway

      - name: Run Flyway Migration
        run: |
          flyway -url=${{ secrets.DB_URL }} \
                 -user=${{ secrets.DB_USER }} \
                 -password=${{ secrets.DB_PASSWORD }} \
                 -locations=filesystem:./sql \
                 migrate
