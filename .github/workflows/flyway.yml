name: Flyway Multi-Env Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  # ================= DIT =================

  preview-dit:
    name: Preview DIT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Flyway Info (DIT)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="${{ secrets.DIT_DB_URL }}" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            info

  deploy-dit:
    name: Deploy DIT
    runs-on: ubuntu-latest
    needs: preview-dit
    environment: DIT   # 👈 approval required

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Flyway Migrate (DIT)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="${{ secrets.DIT_DB_URL }}" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            migrate


  # ================= SIT =================

  preview-sit:
    name: Preview SIT
    runs-on: ubuntu-latest
    needs: deploy-dit

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Flyway Info (SIT)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="${{ secrets.SIT_DB_URL }}" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            info

  deploy-sit:
    name: Deploy SIT
    runs-on: ubuntu-latest
    needs: preview-sit
    environment: SIT   # 👈 approval required

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Flyway Migrate (SIT)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="${{ secrets.SIT_DB_URL }}" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            migrate


  # ================= PROD =================

  preview-prod:
    name: Preview PROD
    runs-on: ubuntu-latest
    needs: deploy-sit

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Flyway Info (PROD)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="${{ secrets.PROD_DB_URL }}" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            info

  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest
    needs: preview-prod
    environment: PROD   # 👈 approval required

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Flyway Migrate (PROD)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="${{ secrets.PROD_DB_URL }}" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            migrate
