name: Flyway Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  # ================= DIT =================

  preview-dit:
    name: Preview DIT Migration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Flyway Info (Preview)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:postgresql://ep-cold-sun-amjgpd78.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            info

  deploy-dit:
    name: Deploy to DIT
    runs-on: ubuntu-latest
    needs: preview-dit
    environment: DIT   # 👈 approval here

    steps:
      - uses: actions/checkout@v3

      - name: Flyway Migrate DIT
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:postgresql://ep-cold-sun-amjgpd78.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            migrate


  # ================= SIT =================

  preview-sit:
    name: Preview SIT Migration
    runs-on: ubuntu-latest
    needs: deploy-dit

    steps:
      - uses: actions/checkout@v3

      - name: Flyway Info SIT
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:postgresql://ep-cold-sun-amjgpd78.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            info

  deploy-sit:
    name: Deploy to SIT
    runs-on: ubuntu-latest
    needs: preview-sit
    environment: SIT   # 👈 approval

    steps:
      - uses: actions/checkout@v3

      - name: Flyway Migrate SIT
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:postgresql://ep-cold-sun-amjgpd78.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            migrate


  # ================= PROD =================

  preview-prod:
    name: Preview PROD Migration
    runs-on: ubuntu-latest
    needs: deploy-sit

    steps:
      - uses: actions/checkout@v3

      - name: Flyway Info PROD
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:postgresql://ep-cold-sun-amjgpd78.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            info

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: preview-prod
    environment: PROD   # 👈 approval

    steps:
      - uses: actions/checkout@v3

      - name: Flyway Migrate PROD
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/sql:/flyway/sql \
            flyway/flyway:latest \
            -url="jdbc:postgresql://ep-cold-sun-amjgpd78.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require" \
            -user="${{ secrets.DB_USER }}" \
            -password="${{ secrets.DB_PASSWORD }}" \
            migrate
